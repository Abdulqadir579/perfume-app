<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in &middot; Cost &amp; Margin Comparator</title>
<style>
  :root{
    --ink:#14213d; --ink-2:#1f2d50; --paper:#faf8f4; --card:#ffffff;
    --amber:#c9842b; --amber-deep:#a86916; --line:#e7e2d8;
    --bad:#b0392c; --muted:#6b7280;
    --shadow:0 10px 30px rgba(20,33,61,.08);
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .box{width:100%;max-width:380px}
  .eyebrow{
    font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--amber-deep);font-weight:600;margin-bottom:12px;text-align:center
  }
  h1{font-size:1.4rem;margin:0 0 6px;text-align:center;letter-spacing:-.01em}
  .sub{margin:0 0 24px;color:var(--muted);font-size:.9rem;text-align:center}

  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow);padding:26px;
  }
  label{display:block;font-size:.82rem;font-weight:600;margin-bottom:8px}
  input[type=password]{
    width:100%;border:1px solid var(--line);border-radius:10px;
    padding:13px 14px;font-size:1rem;font-family:inherit;color:var(--ink);
    background:#fff;transition:border-color .15s;
  }
  input[type=password]:focus{outline:none;border-color:var(--amber)}
  button{
    width:100%;border:none;border-radius:11px;padding:14px;font-size:1rem;
    font-weight:600;color:#fff;background:var(--ink);cursor:pointer;
    transition:background .15s;font-family:inherit;margin-top:16px
  }
  button:hover:not(:disabled){background:var(--ink-2)}
  button:disabled{background:#c7c9d1;cursor:not-allowed}
  .spin{
    display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;
    vertical-align:-2px;margin-right:8px
  }
  @keyframes sp{to{transform:rotate(360deg)}}
  .msg{
    margin-top:14px;border-radius:10px;padding:12px 14px;font-size:.86rem;
    display:none;background:#fbe9e7;color:var(--bad);border:1px solid #f3c9c4
  }
  .msg.show{display:block}
</style>
</head>
<body>
<div class="box">
  <div class="eyebrow">Wholesale Pricing</div>
  <h1>Cost &amp; Margin Comparator</h1>
  <p class="sub">Sign in to continue</p>

  <div class="card">
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" autofocus>
    <button id="go">Sign in</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
const pw=document.getElementById('pw');
const go=document.getElementById('go');
const msg=document.getElementById('msg');

function showErr(t){ msg.textContent=t; msg.classList.add('show'); }
function hideErr(){ msg.classList.remove('show'); }

async function submit(){
  if(!pw.value){ showErr('Please enter the password.'); return; }
  hideErr();
  const orig=go.innerHTML;
  go.disabled=true; go.innerHTML='<span class="spin"></span>Signing in\u2026';
  try{
    const fd=new FormData();
    fd.append('password', pw.value);
    const r=await fetch('/api/login',{method:'POST',body:fd});
    if(!r.ok){
      let d='Could not sign in.';
      try{const j=await r.json(); if(j.detail) d=j.detail;}catch(e){}
      showErr(d);
      pw.value=''; pw.focus();
      return;
    }
    window.location.href='/';
  }catch(e){
    showErr('Network problem \u2014 please try again.');
  }finally{
    go.disabled=false; go.innerHTML=orig;
  }
}

go.addEventListener('click',submit);
pw.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
pw.addEventListener('input',hideErr);
</script>
</body>
</html>
